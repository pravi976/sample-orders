id: ORDERS_REST_TC001_INVENTORY_EXPECTATION
name: Orders inventory availability expectation smoke
team: orders-team
microservice: inventory-contracts
service_type: rest
tags: [gate1, smoke, critical, inventory-contracts, rest, main, develop, test, release]
branches: [main, develop, test, release]
severity: critical
ignore_json_paths:
  - $.headers
rest:
  method: GET
  base_url: http://localhost:8083
  endpoint: /api/orders/inventory/sku/{sku}/availability
  path_params:
    sku: SKU-LAPTOP-999
  query_params:
    warehouse: MEM-01
    includeAlternates: true
    customerTier: GOLD
  expected_status: 200
  timeout_seconds: 5
