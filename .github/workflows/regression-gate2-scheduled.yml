name: Orders Gate 2 Scheduled Regression

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 1-5"

jobs:
  gate2:
    runs-on: windows-latest
    strategy:
      matrix:
        branch: [test, release]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build and start orders service
        shell: pwsh
        run: |
          .\gradlew.bat bootJar -x test
          $jar = Get-ChildItem build\libs\*.jar | Where-Object { $_.Name -notlike '*plain*' } | Select-Object -First 1
          $process = Start-Process java -ArgumentList "-jar `"$($jar.FullName)`"" -PassThru
          "APP_PID=$($process.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append
          for ($i = 0; $i -lt 30; $i++) {
            try {
              Invoke-WebRequest "http://localhost:8083/api/orders/inventory/sku/SKU-LAPTOP-999/availability?warehouse=MEM-01&includeAlternates=true&customerTier=GOLD" -UseBasicParsing | Out-Null
              exit 0
            } catch {
              Start-Sleep -Seconds 2
            }
          }
          throw "Orders service did not become ready"
      - name: Install enterprise regression platform
        run: python -m pip install git+https://github.com/pravi976/enterprise-regression-platform.git
      - name: Run orders Gate 2
        run: |
          regauto run-gate2 `
            --repo-root . `
            --branch "${{ matrix.branch }}" `
            --results-dir regression-results/gate2-${{ matrix.branch }} `
            --trigger schedule
      - name: Upload Gate 2 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orders-gate2-${{ matrix.branch }}-regression-results
          path: regression-results/gate2-${{ matrix.branch }}
      - name: Stop orders service
        if: always()
        shell: pwsh
        run: |
          if ($env:APP_PID) { Stop-Process -Id $env:APP_PID -Force -ErrorAction SilentlyContinue }
